<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="P2P clipboard sync — share text and images between devices instantly" />
		<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>" />
		<title>clipdrop</title>
		<link rel="stylesheet" href="https://unpkg.com/cybercore-css@latest/dist/cybercore.min.css" />
		<script>
			// Load VDO Ninja SDK with fallback. The @latest tag on jsDelivr /gh/
			// path goes through a 302 redirect that times out on some networks
			// (ERR_CONNECTION_TIMED_OUT), which silently disabled P2P entirely.
			// @main hits the file directly. If the primary CDN fails we try
			// gcore.jsdelivr.net, then sdk.vdo.ninja (the project's own host).
			(function () {
				var sources = [
					'https://cdn.jsdelivr.net/gh/steveseguin/ninjasdk@main/vdoninja-sdk.min.js',
					'https://gcore.jsdelivr.net/gh/steveseguin/ninjasdk@main/vdoninja-sdk.min.js',
					'https://sdk.vdo.ninja/vdoninja-sdk.min.js'
				];
				var i = 0;
				function loadNext() {
					if (i >= sources.length) {
						console.error('[clipdrop] all SDK CDNs failed');
						return;
					}
					var s = document.createElement('script');
					s.src = sources[i++];
					s.onload = function () { console.log('[clipdrop] SDK loaded from', s.src); };
					s.onerror = function () {
						console.warn('[clipdrop] SDK CDN failed:', s.src);
						loadNext();
					};
					document.head.appendChild(s);
				}
				loadNext();
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
