name = "clipdrop"
compatibility_date = "2024-12-01"

# Pages 部署配置
[pages]
build_output_dir = ".svelte-kit/output/client"

# KV namespace for text fallback sync
# Create with: npx wrangler kv namespace create SYNC
# Then paste the id below
[[kv_namespaces]]
binding = "SYNC"
id = "YOUR_KV_NAMESPACE_ID"
